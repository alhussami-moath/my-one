

services:
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "3000"
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "80"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    restart: always